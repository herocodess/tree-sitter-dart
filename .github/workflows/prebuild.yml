name: Prebuild

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prebuild:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: x64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: linux
            arch: x64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build prebuilt
        run: npx prebuildify --napi --strip --name node.napi

      - name: Verify binary
        run: |
          test -f prebuilds/${{ matrix.os }}-${{ matrix.arch }}/node.napi.node
          echo "Binary OK."

      - name: Test
        run: |
          npm install tree-sitter --no-save
          node test/integration.js

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 7

  publish:
    needs: prebuild
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v4
        with:
          pattern: prebuilt-*
          path: prebuilds/
          merge-multiple: true

      - name: Verify all prebuilts
        run: |
          test -f prebuilds/darwin-x64/node.napi.node   || { echo "MISSING darwin-x64"; exit 1; }
          test -f prebuilds/darwin-arm64/node.napi.node || { echo "MISSING darwin-arm64"; exit 1; }
          test -f prebuilds/linux-x64/node.napi.node    || { echo "MISSING linux-x64"; exit 1; }
          test -f prebuilds/linux-arm64/node.napi.node  || { echo "MISSING linux-arm64"; exit 1; }
          find prebuilds -name "*.node" | xargs ls -lh

      - name: Final test
        run: |
          npm install tree-sitter --no-save
          node test/integration.js

      - name: Dry run
        run: npm publish --dry-run --access public

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: prebuilds/**/*.node
          generate_release_notes: true
